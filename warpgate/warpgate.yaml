# yaml-language-server: $schema=https://raw.githubusercontent.com/warp-tech/warpgate/refs/heads/main/config-schema.json

sso_providers: []
recordings:
  enable: true
  path: /data/recordings
external_host: null
database_url: sqlite:/data/db
ssh:
  enable: true
  listen: '[::]:2222'
  external_port: null
  keys: /data/ssh-keys
  host_key_verification: prompt
  inactivity_timeout: 5m
  keepalive_interval: null
http:
  listen: '[::]:8888'
  external_port: null
  certificate: /certs/cert.pem
  key: /certs/key.pem
  trust_x_forwarded_headers: false
  session_max_age: 30m
  cookie_max_age: 1day
  sni_certificates: []
kubernetes:
  enable: true
  listen: '[::]:8443'
  external_port: null
  certificate: /certs/cert.pem
  key: /certs/key.pem
  session_max_age: 30m
mysql:
  enable: true
  listen: '[::]:33306'
  external_port: null
  certificate: /certs/cert.pem
  key: /certs/key.pem
postgres:
  enable: true
  listen: '[::]:55432'
  external_port: null
  certificate: /certs/cert.pem
  key: /certs/key.pem
log:
  retention: 7days
  send_to: null
  format: text

  