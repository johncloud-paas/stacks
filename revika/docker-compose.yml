services:
  node:
    restart: unless-stopped
    image: ghcr.io/ydethe/revika-node:0.1.1
    volumes:
      - $JOHNCLOUD_ROOT/$COMPOSE_PROJECT_NAME/data:/data
    ports:
      - "4001:4001"
    command:
      - -data=/data
      - -listen=/ip4/0.0.0.0/tcp/4001
      - -listen=/ip4/0.0.0.0/udp/4001/quic-v1
      - -mdns=false
      - -bootstrap
      - $SEED_ADDR
      - -repair-interval=${REPAIR_INTERVAL:-1h}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9096/healthz/"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    external: true
    name: $TRAEFIK_NETWORK
    