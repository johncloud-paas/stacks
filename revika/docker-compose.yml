services:
  node:
    restart: unless-stopped
    image: ghcr.io/ydethe/revika-node:latest
    volumes:
      - $JOHNCLOUD_ROOT/$COMPOSE_PROJECT_NAME/data:/data
    ports:
      - "4001:4001"
    command:
      - -data=/data
      - -listen=/ip4/0.0.0.0/tcp/4001
      - -mdns=false
      - -repair-interval=${REPAIR_INTERVAL:-1h}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9096/healthz/"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.name=$COMPOSE_PROJECT_NAME
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.full-domain=$HOST
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.protocol=http
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.ssl=true
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.auth.sso-enabled=true
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.auth.sso-roles[0]=Member
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.targets[0].method=http
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.targets[0].port=9096
      - "homepage.group=$HOME_GROUP"
      - "homepage.name=$HOME_NAME"
      - "homepage.icon=$HOME_ICON"
      - "homepage.href=https://$HOST"
      - "homepage.description=$HOME_DESCRIPTION"

networks:
  default:
    external: true
    name: $TRAEFIK_NETWORK
    