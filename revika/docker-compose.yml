services:
  node:
    restart: unless-stopped
    image: ghcr.io/ydethe/revika-node:latest
    volumes:
      - $JOHNCLOUD_ROOT/$COMPOSE_PROJECT_NAME/data:/data
    ports:
      - "4001:4001"
    command:
      - -data=/data
      - -listen=/ip4/0.0.0.0/tcp/4001
      - -mdns=false
      - -repair-interval=${REPAIR_INTERVAL:-1h}
      - -bootstrap
      - $SEED_ADDR
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9096/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s
    labels:
      - pangolin.proxy-resources.$PANGOLIN_RESOURCE_NAME.name=$PANGOLIN_RESOURCE_NAME
      - pangolin.proxy-resources.$PANGOLIN_RESOURCE_NAME.full-domain=$HOST
      - pangolin.proxy-resources.$PANGOLIN_RESOURCE_NAME.protocol=http
      - pangolin.proxy-resources.$PANGOLIN_RESOURCE_NAME.ssl=true
      - pangolin.proxy-resources.$PANGOLIN_RESOURCE_NAME.auth.sso-enabled=true
      - pangolin.proxy-resources.$PANGOLIN_RESOURCE_NAME.auth.sso-roles[0]=Member
      - pangolin.proxy-resources.$PANGOLIN_RESOURCE_NAME.targets[0].method=http
      - pangolin.proxy-resources.$PANGOLIN_RESOURCE_NAME.targets[0].port=9096
      - "homepage.group=$HOME_GROUP"
      - "homepage.name=$HOME_NAME"
      - "homepage.icon=$HOME_ICON"
      - "homepage.href=https://$HOST/status"
      - "homepage.description=$HOME_DESCRIPTION"

networks:
  default:
    external: true
    name: $TRAEFIK_NETWORK
    
