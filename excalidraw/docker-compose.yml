services:
  app:
    image: excalidraw/excalidraw:latest
    # ports:
    #   - "3000:80"
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Replacing WebSocket URL with: $$VITE_APP_WS_SERVER_URL"
        find /usr/share/nginx/html/assets -type f -name "*.js" -exec sed -i 's|https://oss-collab\.excalidraw\.com|'$$VITE_APP_WS_SERVER_URL'|g' {} +
        echo "Starting nginx..."
        nginx -g 'daemon off;'
    stdin_open: true
    environment:
      - NODE_ENV=production
      - VITE_APP_WS_SERVER_URL=https://collab.$HOST
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /var/cache/nginx/client_temp:rw,noexec,nosuid,size=64m
    labels:
      - "homepage.group=$HOME_GROUP"
      - "homepage.name=$HOME_NAME"
      - "homepage.icon=$HOME_ICON"
      - "homepage.href=https://$HOST"
      - "homepage.description=$HOME_DESCRIPTION"
      - pangolin.public-resources.${COMPOSE_PROJECT_NAME}.name=${COMPOSE_PROJECT_NAME}
      - pangolin.public-resources.${COMPOSE_PROJECT_NAME}.full-domain=$HOST
      - pangolin.public-resources.${COMPOSE_PROJECT_NAME}.protocol=http
      - pangolin.public-resources.${COMPOSE_PROJECT_NAME}.ssl=true
      - pangolin.public-resources.${COMPOSE_PROJECT_NAME}.auth.sso-enabled=true
      - pangolin.public-resources.${COMPOSE_PROJECT_NAME}.auth.sso-roles[0]=Member
      - pangolin.public-resources.${COMPOSE_PROJECT_NAME}.targets[0].method=http
  

  room:
    image: excalidraw/excalidraw-room:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - pangolin.public-resources.${COMPOSE_PROJECT_NAME}_collab.name=${COMPOSE_PROJECT_NAME}_collab
      - pangolin.public-resources.${COMPOSE_PROJECT_NAME}_collab.full-domain=collab.$HOST
      - pangolin.public-resources.${COMPOSE_PROJECT_NAME}_collab.protocol=http
      - pangolin.public-resources.${COMPOSE_PROJECT_NAME}_collab.ssl=true
      # - pangolin.public-resources.${COMPOSE_PROJECT_NAME}_collab.auth.sso-enabled=true
      # - pangolin.public-resources.${COMPOSE_PROJECT_NAME}_collab.auth.sso-roles[0]=Member
      - pangolin.public-resources.${COMPOSE_PROJECT_NAME}_collab.targets[0].method=http

networks:
  default:
    external: true
    name: $TRAEFIK_NETWORK
