services:
  app:
    image: ghcr.io/metatool-ai/metamcp:latest
    environment:
      - NODE_ENV=$NODE_ENV
      - DATABASE_URL=postgresql://metamcp_user:${POSTGRES_PASSWORD}@postgres:5432/metamcp_db
      # - APP_URL=http://localhost:12008
      - APP_URL=https://$HOST
      - NEXT_PUBLIC_APP_URL=https://$HOST
      - BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET
      - OIDC_CLIENT_ID=$OIDC_CLIENT_ID
      - OIDC_CLIENT_SECRET=$OIDC_CLIENT_SECRET
      - OIDC_DISCOVERY_URL=$OIDC_DISCOVERY_URL
      - OIDC_AUTHORIZATION_URL=$OIDC_AUTHORIZATION_URL
      - OIDC_PROVIDER_ID=oidc
      - OIDC_SCOPES=$OIDC_SCOPES
      - OIDC_PKCE=$OIDC_PKCE
      - TRANSFORM_LOCALHOST_TO_DOCKER_INTERNAL=true
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "homepage.group=$HOME_GROUP"
      - "homepage.name=$HOME_NAME"
      - "homepage.icon=$HOME_ICON"
      - "homepage.href=https://$HOST"
      - "homepage.description=$HOME_DESCRIPTION"
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.name=$COMPOSE_PROJECT_NAME
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.full-domain=$HOST
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.protocol=http
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.ssl=true
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.auth.sso-enabled=true
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.auth.sso-roles[0]=Member
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.targets[0].method=http
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.targets[0].port=12008

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: metamcp_db
      POSTGRES_USER: metamcp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - $JOHNCLOUD_ROOT/$COMPOSE_PROJECT_NAME/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metamcp_user -d metamcp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  default:
    external: true
    name: $TRAEFIK_NETWORK
