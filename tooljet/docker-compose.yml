services:
  tooljet:
    image: tooljet/tooljet:v3.20.140-lts
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      SERVE_CLIENT: "true"
      PORT: "80"
      TOOLJET_HOST: http://localhost:80
      LOCKBOX_MASTER_KEY: $LOCKBOX_MASTER_KEY
      SECRET_KEY_BASE: $SECRET_KEY_BASE
      # DATABASE CONFIG
      ORM_LOGGING: all
      PG_DB: tooljet_production
      PG_USER: postgres
      PG_HOST: postgresql
      PG_PASS: $PG_PASS
      # TOOLJET DATABASE
      TOOLJET_DB: tooljet_db
      TOOLJET_DB_USER: postgres
      TOOLJET_DB_HOST: postgresql
      TOOLJET_DB_PASS: $PG_PASS

      PGRST_DB_URI: postgres://postgres:$PG_PASS@postgresql/tooljet_db
      PGRST_HOST: localhost:3002
      PGRST_JWT_SECRET: $PGRST_JWT_SECRET
      PGRST_SERVER_PORT: 3002
      PGRST_DB_PRE_CONFIG: postgrest.pre_config

      # Checks every 24 hours to see if a new version of ToolJet is available
      # (Enabled by default. Set false to disable)
      CHECK_FOR_UPDATES: true

      # Checks every 24 hours to update app telemetry data to ToolJet hub.
      # (Telemetry is enabled by default. Set value to true to disable.)
      DISABLE_TOOLJET_TELEMETRY: false

      # EMAIL CONFIGURATION
      DEFAULT_FROM_EMAIL: $DEFAULT_FROM_EMAIL
      SMTP_USERNAME: $SMTP_USERNAME
      SMTP_PASSWORD: $SMTP_PASSWORD
      SMTP_DOMAIN: $SMTP_DOMAIN
      SMTP_PORT: $SMTP_PORT

      # DISABLE USER SIGNUPS (true or false). only applicable if Multi-Workspace feature is enabled
      DISABLE_SIGNUPS: $DISABLE_SIGNUPS

      # FEATURE TOGGLE
      COMMENT_FEATURE_ENABLE: true
      ENABLE_MULTIPLAYER_EDITING: true
      ENABLE_MARKETPLACE_FEATURE: true

      SSO_DISABLE_SIGNUPS: true

      #session expiry in minutes
      USER_SESSION_EXPIRY: 2880

      #TELEMETRY
      DEPLOYMENT_PLATFORM: docker

      # Workflow scheduling configuration
      # Worker Mode
      # Set to 'true' to enable job processing
      # Set to 'false' or unset for HTTP-only mode (scaled deployments)
      WORKER: true

      # Workflow Processor Concurrency (optional)
      # Number of workflow jobs processed concurrently per worker
      # Default: 5
      TOOLJET_WORKFLOW_CONCURRENCY: 5

      # Workflow Execution Timeout (optional)
      # Maximum time (in seconds) for a workflow to execute
      # Default: 60 seconds
      WORKFLOW_TIMEOUT_SECONDS: 60
    command: npm run start:prod
    labels:
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.name=$COMPOSE_PROJECT_NAME
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.full-domain=$HOST
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.protocol=http
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.ssl=true
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.targets[0].method=http
      - pangolin.public-resources.$COMPOSE_PROJECT_NAME.targets[0].port=80
      - "homepage.group=$HOME_GROUP"
      - "homepage.name=$HOME_NAME"
      - "homepage.icon=$HOME_ICON"
      - "homepage.href=https://$HOST"
      - "homepage.description=$HOME_DESCRIPTION"

  postgresql:
    image: postgres:16
    restart: unless-stopped
    healthcheck:
      interval: 10s
      retries: 10
      test: "pg_isready -U postgres -d tooljet_production"
      timeout: 2s
    volumes:
      - $JOHNCLOUD_ROOT/$COMPOSE_PROJECT_NAME/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=tooljet_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${PG_PASS}
      
networks:
  default:
    external: true
    name: $TRAEFIK_NETWORK
    